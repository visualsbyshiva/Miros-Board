<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — Smart Product Recommendations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f9fafb;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        color: #111111;
      }

      .login-card {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
        padding: 2.5rem;
        width: 100%;
        max-width: 400px;
      }

      .login-header {
        margin-bottom: 2rem;
        text-align: center;
      }

      .login-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: #111111;
        letter-spacing: -0.02em;
        margin-bottom: 0.375rem;
      }

      .login-subtitle {
        font-size: 0.875rem;
        color: #5c5c5c;
        font-weight: 400;
      }

      .form-group {
        margin-bottom: 1.25rem;
      }

      label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: #111111;
        margin-bottom: 0.5rem;
      }

      input {
        width: 100%;
        padding: 0.625rem 0.875rem;
        border: 1.5px solid #e5e7eb;
        border-radius: 10px;
        font-family: inherit;
        font-size: 0.9375rem;
        color: #111111;
        background: #ffffff;
        outline: none;
        transition: border-color 150ms ease, box-shadow 150ms ease;
      }

      input::placeholder {
        color: #9d9d9d;
      }

      input:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
      }

      .submit-btn {
        width: 100%;
        padding: 0.6875rem 1rem;
        background: #111111;
        color: #ffffff;
        border: none;
        border-radius: 10px;
        font-family: inherit;
        font-size: 0.9375rem;
        font-weight: 600;
        cursor: pointer;
        margin-top: 0.5rem;
        transition: background 150ms ease, transform 100ms ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
      }

      .submit-btn:hover:not(:disabled) {
        background: #2563eb;
      }

      .submit-btn:active:not(:disabled) {
        transform: scale(0.99);
      }

      .submit-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.35);
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: spin 0.65s linear infinite;
        display: none;
      }

      .submit-btn.loading .spinner {
        display: block;
      }

      .submit-btn.loading .btn-text {
        opacity: 0.7;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error-message {
        display: none;
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #dc2626;
        border-radius: 8px;
        padding: 0.625rem 0.875rem;
        font-size: 0.8125rem;
        font-weight: 500;
        margin-bottom: 1.25rem;
        align-items: center;
        gap: 0.5rem;
      }

      .error-message.visible {
        display: flex;
      }

      .error-icon {
        flex-shrink: 0;
        width: 16px;
        height: 16px;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="login-header">
        <h1 class="login-title">Smart Product Recommendations</h1>
        <p class="login-subtitle">Sign in to continue</p>
      </div>

      <div class="error-message" id="errorMessage">
        <svg class="error-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 5v3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="8" cy="11" r="0.75" fill="currentColor"/>
        </svg>
        <span id="errorText">Invalid username or password.</span>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter username"
            autocomplete="username"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter password"
            autocomplete="current-password"
            required
          />
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">
          <div class="spinner"></div>
          <span class="btn-text">Sign In</span>
        </button>
      </form>
    </div>

    <script>
      const form = document.getElementById('loginForm')
      const submitBtn = document.getElementById('submitBtn')
      const errorMessage = document.getElementById('errorMessage')
      const errorText = document.getElementById('errorText')

      function showError(msg) {
        errorText.textContent = msg
        errorMessage.classList.add('visible')
      }

      function hideError() {
        errorMessage.classList.remove('visible')
      }

      function setLoading(loading) {
        submitBtn.disabled = loading
        submitBtn.classList.toggle('loading', loading)
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault()
        hideError()

        const username = document.getElementById('username').value.trim()
        const password = document.getElementById('password').value

        if (!username || !password) {
          showError('Please enter your username and password.')
          return
        }

        setLoading(true)

        try {
          const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
          })

          if (res.ok) {
            window.location.replace('/')
          } else {
            showError('Invalid username or password.')
            document.getElementById('password').value = ''
            document.getElementById('password').focus()
          }
        } catch {
          showError('Something went wrong. Please try again.')
        } finally {
          setLoading(false)
        }
      })
    </script>
  </body>
</html>
